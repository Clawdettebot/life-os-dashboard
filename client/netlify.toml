# Netlify configuration for API proxy
[build]
  command = "npm run build"
  publish = "dist"

# Proxy API requests to home server
[[redirects]]
  from = "/api/shop/*"
  to = "http://146.59.145.84:3000/api/shop/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "http://146.59.145.84:3000/api/:splat"
  status = 200
  force = true

# Fallback for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
